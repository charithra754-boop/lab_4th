<!DOCTYPE html>
<html>
<head>
    <title>Course Registration</title>
    <style>
        body { font-family: Arial; text-align: center; }
        form { border: 1px solid #ccc; padding: 20px; display: inline-block; }
    </style>
</head>
<body>
    <h2>Course Registration</h2>
    <form id="regForm">
        Name: <input type="text" id="name" required><br><br>
        Email: <input type="email" id="email" required><br><br>
        Phone: <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="10 digits" required><br><br>
        Course: <select id="course">
            <option>MERN Stack</option>
            <option>Python</option>
        </select><br><br>
        <button type="submit">Register</button>
    </form>
    <p id="msg"></p>
    <script>
        const regForm = document.getElementById('regForm');
        const msg = document.getElementById('msg');
        regForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            msg.innerText = `Registered ${name} (${email}, ${phone})`;
        });
    </script>
</body>
</html>
