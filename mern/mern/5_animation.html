<!DOCTYPE html>
<html>
<head>
    <title>Automatic Text Animation</title>
    <style>
        body { display: grid; place-items: center; height: 100vh; margin: 0; background: #f4f4f4; font-family: Arial, sans-serif; }
        #text { font-size: 20px; transition: all 0.5s ease-in-out; font-weight: bold; color: blue; }
    </style>
</head>
<body>

    <h1 id="text">STARTING...</h1>

    <script>
        let isLarge = false;

        // Automatically runs the loop every 1500 milliseconds (1.5 seconds)
        setInterval(() => {
            if (!isLarge) {
                text.style.fontSize = "50px";
                text.style.color = "red";
                text.innerText = "ENLARGED";
            } else {
                text.style.fontSize = "20px";
                text.style.color = "blue";
                text.innerText = "SHRUNK";
            }
            isLarge = !isLarge;
        }, 1500);
    </script>

</body>
</html>
