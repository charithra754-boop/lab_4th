<!DOCTYPE html>
<html>
<head>
    <title>Password Strength</title>
    <style>
        body { font-family: Arial; text-align: center; }
        #strength { font-weight: bold; }
    </style>
</head>
<body>
    <h2>Password Strength Checker</h2>
    <input type="password" id="pass">
    <p>Strength: <span id="strength">Too Short</span></p>
    <script>
        const passInput = document.getElementById('pass');
        const strength = document.getElementById('strength');
        passInput.addEventListener('input', check);

        function check() {
            const p = passInput.value;
            const regex = /^(?=.*[a-zA-Z])(?=.*[0-9]).{8,}$/;

            if (p.length === 0) {
                strength.innerText = "";
            } else if (regex.test(p)) {
                strength.innerText = "Strong (Alphanumeric + 8 chars)";
                strength.style.color = "green";
            } else {
                strength.innerText = "Weak (Need Letter, Number & 8+ length)";
                strength.style.color = "red";
            }
        }
    </script>
</body>
</html>
